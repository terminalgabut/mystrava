<head>

    <link rel="stylesheet" href="css/main.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <style id="export-styles">
/* ============================= */
/* EXPORT MODE (MINIMAL CLEAN)   */
/* ============================= */

/* 1. Sembunyikan elemen UI yang tidak perlu saat export */
.is-exporting .no-export,
.is-exporting button,
.is-exporting .nav-menu,
.is-exporting #__vconsole {
  display: none !important;
}

        .is-exporting body {
  background: #f8fafc;
        }
/* 2. Stabilkan layout dasar (tanpa override brutal) */
.is-exporting * {
  box-sizing: border-box !important;
}

/* 3. Perbaikan Map (biar tidak pecah saat capture) */
.is-exporting .mapboxgl-map {
  border-radius: 16px !important;
  overflow: hidden !important;
}

/* 4. Anti blur text (khusus mobile / Android) */
.is-exporting {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* 5. Hindari efek yang sering bikin html2canvas glitch */
.is-exporting * {
  backdrop-filter: none !important;
}

/* 6. Safety: cegah elemen lompat */
.is-exporting img,
.is-exporting canvas {
  max-width: 100% !important;
  display: block;
}
    </style>
</head>

<body>

    <div id="app"></div> 

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>var vConsole = new window.VConsole();</script>

</body>
