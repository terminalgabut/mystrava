<!DOCTYPE html>
<html lang="id">
<head>  
    <meta charset="UTF-8">  
    <title>My Strava Pro</title>   
    <meta name="viewport" content="width=device-width, initial-scale=1">   
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css' rel='stylesheet' />
    <link rel="stylesheet" href="css/main.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <style id="export-styles">
  /* Gaya ini HANYA aktif saat class .is-exporting ditambahkan oleh JS */
  
  .is-exporting.activity-detail-wrapper {
    width: 600px !important;
    background-color: #F1F5F9 !important; /* Slate 50 asli */
    padding: 30px !important;
    margin: 0 auto !important;
    border-radius: 24px !important;
    display: block !important;
    opacity: 1 !important;
    filter: none !important;
  }

  .is-exporting .stat-value, 
  .is-exporting h1 {
    color: #0F172A !important; /* Hitam Slate 900 */
    opacity: 1 !important;
    letter-spacing: 0 !important; /* Cegah blur */
    -webkit-font-smoothing: antialiased !important;
  }

  .is-exporting .label-muted {
    color: #475569 !important; /* Slate 600 */
    font-weight: 800 !important;
    opacity: 1 !important;
    text-transform: uppercase !important;
  }

  .is-exporting p, .is-exporting span, .is-exporting div {
    color: #1E293B !important; /* Slate 800 */
    opacity: 1 !important;
  }

  /* Sembunyikan elemen pengganggu di foto */
  .is-exporting .no-export,
  .is-exporting button,
  .is-exporting .nav-menu {
    display: none !important;
  }
    </style>
</head>

<body>

    <div id="app"></div> 

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>var vConsole = new window.VConsole();</script>

    <script type="module" src="js/app.js?v=test293"></script> 

</body>
</html>
