<!DOCTYPE html>
<html lang="id">
<head>  
    <meta charset="UTF-8">  
    <title>My Strava Pro</title>   
    <meta name="viewport" content="width=device-width, initial-scale=1">   
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css' rel='stylesheet' />
    <link rel="stylesheet" href="css/main.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
  /* Reset dasar saat ekspor */
  .is-exporting {
    background-color: #F1F5F9 !important;
  }
  
  .is-exporting .activity-detail-wrapper {
    background-color: #F1F5F9 !important;
    width: 600px !important;
    opacity: 1 !important;
  }

  /* PAKSA SEMUA TEKS JADI SOLID (Anti-Pudar) */
  .is-exporting h1, 
  .is-exporting h2, 
  .is-exporting p, 
  .is-exporting span, 
  .is-exporting div:not([class*="card"]) {
    opacity: 1 !important;
    -webkit-font-smoothing: antialiased;
  }

  /* Teks Utama (Judul & Angka Statistik) */
  .is-exporting h1, 
  .is-exporting .stat-value,
  .is-exporting .text-main {
    color: #0F172A !important; /* Slate 900 */
    font-weight: 800 !important;
  }

  /* Teks Muted (Label) - Kita pertebal sedikit agar tidak hilang */
  .is-exporting .text-slate-400, 
  .is-exporting .text-muted, 
  .is-exporting .label-muted {
    color: #475569 !important; /* Slate 600 (lebih gelap dari 400) */
    opacity: 1 !important;
  }

  /* KARTU TIME ANALYSIS (Hitam Pekat) */
  /* Kita targetkan class spesifik atau div yang punya latar gelap */
  .is-exporting [class*="card-dark"], 
  .is-exporting .time-analysis-card,
  .is-exporting .bg-slate-900 { 
    background-color: #0F172A !important;
    color: #FFFFFF !important;
    opacity: 1 !important;
    border: none !important;
  }

  /* Paksa teks di dalam kartu gelap jadi putih terang */
  .is-exporting [class*="card-dark"] *, 
  .is-exporting .time-analysis-card * {
    color: #FFFFFF !important;
    opacity: 1 !important;
  }

  /* FIX MAPBOX & IMAGE */
  .is-exporting .mapboxgl-canvas,
  .is-exporting img {
    opacity: 1 !important;
    filter: none !important;
  }

  /* Pastikan teks di dalam kartu gelap dipaksa putih terang */
.is-exporting .bg-slate-900 *, 
.is-exporting [class*="card-dark"] * {
  color: #FFFFFF !important;
  opacity: 1 !important;
}

/* Pastikan Mapbox Container punya warna dasar jika tile gagal load */
.is-exporting .mapboxgl-map {
  background-color: #E5E7EB !important;
}
    </style>
</head>

<body>

    <div id="app"></div> 

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>var vConsole = new window.VConsole();</script>

    <script type="module" src="js/app.js?v=test293"></script> 

</body>
</html>
