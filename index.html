<!DOCTYPE html>
<html lang="id">
<head>  
    <meta charset="UTF-8">  
    <title>My Strava Pro</title>   
    <meta name="viewport" content="width=device-width, initial-scale=1">   
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css' rel='stylesheet' />
    <link rel="stylesheet" href="css/main.css">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <style id="export-styles"> 
    /* 1. GLOBAL RESET & CALIBRATION */
    .is-exporting * {
        box-sizing: border-box;
        /* Line-height 1 adalah wajib agar tidak ada padding hantu */
        line-height: 1 !important; 
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
    }

    .is-exporting { 
        background: #0F172A !important; 
        padding: 0 !important;
        margin: 0 !important;
    } 

    #export-root {
        width: 600px;
        background: #0F172A;
        height: auto !important;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* 2. THE FIX: ANTI-GRAVITY CALIBRATION */
    /* Kita tarik semua teks naik secara fisik. 
       Jika di gambar masih turun, naikkan angka -3px ke -4px atau -5px */
    .is-exporting span, 
    .is-exporting p, 
    .is-exporting h1,
    .is-exporting div:not(.mapboxgl-canvas-container):not(#export-map) {
        position: relative;
        top: -3px !important; 
    }

    /* Khusus angka (Tabular Nums) biasanya turun lebih parah */
    .is-exporting .tabular-nums {
        font-variant-numeric: tabular-nums;
        display: inline-flex;
        align-items: center;
        top: -4px !important; /* Tarikan lebih kuat khusus angka */
    }

    /* 3. ASYMMETRIC PADDING (Kompensasi Visual) */
    /* Kita buat bantalan bawah jauh lebih besar untuk 'menopang' teks */
    
    /* Stats Box (Distance, Pace, Elevation) */
    .is-exporting .bg-white\/5, 
    .is-exporting .bg-blue-600 {
        padding-top: 12px !important;
        padding-bottom: 24px !important; /* 2x lipat lebih besar dari atas */
    }

    /* Lap Splits KM Box */
    .is-exporting v-for-split, /* selector jika menggunakan class custom */
    .is-exporting .grid div { 
        padding-top: 8px !important;
        padding-bottom: 16px !important;
    }

    /* 4. MAPBOX FIX */
    .is-exporting .export-map {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 40px;
        overflow: hidden;
    }

    .is-exporting .mapboxgl-canvas {
        border-radius: 40px !important;
        /* Jangan beri 'top' pada canvas agar peta tidak potong */
        top: 0 !important; 
    }

    /* 5. CLEANUP */
    .is-exporting .no-export,
    .is-exporting button,
    .is-exporting .nav-menu,
    .is-exporting #__vconsole {
        display: none !important;
    } 

    .is-exporting * {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        box-shadow: none !important; /* Kadang shadow bikin teks terlihat turun */
    }
    </style>
</head>

<body>

    <div id="export-mount" style="
  position: fixed;
  top: 0;
  left: 0;
  width: 600px;
  opacity: 0;
  pointer-events: none;
  z-index: -1;
"></div>

    <div id="app"></div> 

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>var vConsole = new window.VConsole();</script>

    <script type="module" src="js/app.js?v=test293"></script> 

</body>
</html>
