<!DOCTYPE html>
<html lang="id">
<head>  
    <meta charset="UTF-8">  
    <title>My Strava Pro</title>   
    <meta name="viewport" content="width=device-width, initial-scale=1">   
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css' rel='stylesheet' />
    <link rel="stylesheet" href="css/main.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
  /* Hanya aktif saat proses pengambilan gambar */
  .is-exporting {
    background-color: #F1F5F9 !important; /* Force Slate 50 */
  }
  
  .is-exporting .activity-detail-wrapper {
    background-color: #F1F5F9 !important;
    width: 600px !important;
  }

  /* Perbaikan Kartu Waktu yang Hitam Pudar */
  .is-exporting [class*="card-dark"], 
  .is-exporting .time-analysis-card { 
    background-color: #0F172A !important; /* Force Slate 900 */
    color: #FFFFFF !important;
  }

  /* Perbaikan Teks Utama agar Hitam Pekat */
  .is-exporting h1, 
  .is-exporting .stat-value {
    color: #0F172A !important;
    opacity: 1 !important;
    -webkit-font-smoothing: antialiased;
  }

  /* Perbaikan Peta agar tidak transparan */
  .is-exporting .mapboxgl-canvas {
    opacity: 1 !important;
    background-color: #e5e7eb !important;
  }
    </style>
</head>

<body>

    <div id="app"></div> 

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>var vConsole = new window.VConsole();</script>

    <script type="module" src="js/app.js?v=test293"></script> 

</body>
</html>
