<!DOCTYPE html>
<html lang="id">
<head>  
    <meta charset="UTF-8">  
    <title>My Strava Pro</title>   
    <meta name="viewport" content="width=device-width, initial-scale=1">   
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css' rel='stylesheet' />
    <link rel="stylesheet" href="css/main.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <style id="export-styles"> 
    /* 1. GLOBAL CALIBRATION */
    .is-exporting * {
        box-sizing: border-box;
        /* Kunci line-height agar tidak ada 'bantalan hantu' di bawah teks */
        line-height: 1.1 !important; 
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
    }

    /* 2. ROOT & CONTAINER FIX */
    .is-exporting { 
        background: #0F172A !important; /* Navy Dark Base */
        padding: 0 !important;
        margin: 0 !important;
    } 

    #export-root {
        width: 600px;
        background: #0F172A;
        height: auto !important;
        min-height: auto !important; 
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* 3. OPTICAL ALIGNMENT (Kunci agar teks tidak turun) */
    /* Menarik semua elemen teks naik 1px untuk melawan baseline font */
    .is-exporting span, 
    .is-exporting p, 
    .is-exporting h1,
    .is-exporting div:not(.mapboxgl-canvas-container) {
        transform: translateY(-0.5px);
    }

    /* Khusus untuk angka statistik agar benar-benar di tengah */
    .is-exporting .tabular-nums {
        font-variant-numeric: tabular-nums;
        display: inline-flex;
        align-items: center;
        margin-top: -1px; /* Koreksi tambahan khusus angka */
    }

    /* 4. MAP FIX */
    .is-exporting .export-map {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 40px;
        overflow: hidden;
        position: relative;
    }

    /* Memastikan pojok peta Mapbox tetap rounded saat dicapture */
    .is-exporting .mapboxgl-canvas {
        border-radius: 40px !important;
    }

    /* 5. DYNAMIC PADDING UNTUK KONTEN (Simetris visual) */
    /* Kotak stats (Distance, Pace, Elevation) */
    .is-exporting .stat-box {
        padding-top: 18px;
        padding-bottom: 22px; /* Bottom sedikit lebih besar agar teks terlihat di center */
    }

    /* Kotak Split KM */
    .is-exporting .split-item {
        padding-top: 10px;
        padding-bottom: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    /* 6. CLEANUP ELEMENTS */
    .is-exporting .no-export,
    .is-exporting button,
    .is-exporting .nav-menu,
    .is-exporting #__vconsole {
        display: none !important;
    } 

    .is-exporting img,
    .is-exporting canvas {
        max-width: 100% !important;
        display: block;
    }

    /* Matikan filter yang sering bikin glitch di html2canvas */
    .is-exporting * {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
    }
    </style>
</head>

<body>

    <div id="export-mount" style="
  position: fixed;
  top: 0;
  left: 0;
  width: 600px;
  opacity: 0;
  pointer-events: none;
  z-index: -1;
"></div>

    <div id="app"></div> 

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>var vConsole = new window.VConsole();</script>

    <script type="module" src="js/app.js?v=test293"></script> 

</body>
</html>
