<!DOCTYPE html>
<html lang="id">
<head>  
    <meta charset="UTF-8">  
    <title>My Strava Pro</title>   
    <meta name="viewport" content="width=device-width, initial-scale=1">   
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css' rel='stylesheet' />
    <link rel="stylesheet" href="css/main.css">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <style id="export-styles"> 
        
        .is-exporting { 
            background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
            padding: 24px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        } 
        
        .is-exporting .no-export,
        .is-exporting button,
        .is-exporting .nav-menu,
        .is-exporting #__vconsole {
            display: none !important;
        } 
        
        .is-exporting .export-container {
            width: 600px;
            background: #ffffff;
            border-radius: 28px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            /* Premium shadow */
            box-shadow:
                0 10px 25px rgba(0, 0, 0, 0.06),
                0 4px 10px rgba(0, 0, 0, 0.04);
        }
        
        /* ============================= */
        /* HEADER                        */
        /* ============================= */
        .is-exporting .export-header h1 {
            font-size: 20px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.01em;
        }
        .is-exporting .export-header p {
  font-size: 12px;
  color: #64748b;
  margin-top: 4px;
  font-weight: 500;
}

/* ============================= */
/* MAP                           */
/* ============================= */

/* Di dalam index.html cari baris ini */
.is-exporting .export-map {
  width: 100%;
  aspect-ratio: 1 / 1; /* Pastikan ini 1/1 */
  border-radius: 40px; /* Samakan dengan yang di View */
  overflow: hidden;
}
.is-exporting .mapboxgl-map {
  border-radius: 20px !important;
}

/* ============================= */
/* HERO STAT                     */
/* ============================= */

.is-exporting .export-hero {
  text-align: center;
  padding: 12px 0;
}

.is-exporting .distance {
  font-size: 44px;
  font-weight: 900;
  color: #0f172a;
  letter-spacing: -0.02em;
}

.is-exporting .distance span {
  font-size: 16px;
  font-weight: 600;
  color: #64748b;
}

.is-exporting .meta {
  margin-top: 6px;
  font-size: 13px;
  color: #475569;
  font-weight: 500;
}

/* ============================= */
/* SPLITS CARD                   */
/* ============================= */

.is-exporting .export-splits {
  background: #f9fafb;
  border-radius: 20px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;

  border: 1px solid #f1f5f9;
}

/* Split row */
.is-exporting .split-row {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 8px 10px;
  border-radius: 12px;

  font-size: 13px;
  font-weight: 600;
  color: #0f172a;

  transition: all 0.2s ease;
}

/* subtle alternating */
.is-exporting .split-row:nth-child(odd) {
  background: #ffffff;
}

.is-exporting .split-row:nth-child(even) {
  background: #f8fafc;
}

/* "more" indicator */
.is-exporting .more {
  text-align: center;
  font-size: 12px;
  color: #64748b;
  margin-top: 6px;
  font-weight: 500;
}

/* ============================= */
/* MEDIA FIX                     */
/* ============================= */

.is-exporting img,
.is-exporting canvas {
  max-width: 100% !important;
  display: block;
}

/* Prevent html2canvas glitch */
.is-exporting * {
  backdrop-filter: none !important;
  box-sizing: border-box;
}

        ##export-root {
    width: 600px;
    height: auto !important; /* Biarkan tinggi menyesuaikan konten */
    min-height: auto !important; 
    background: #F8FAFC;
}
    </style>
</head>

<body>

    <div id="export-mount" style="
  position: fixed;
  top: 0;
  left: 0;
  width: 600px;
  opacity: 0;
  pointer-events: none;
  z-index: -1;
"></div>

    <div id="app"></div> 

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>var vConsole = new window.VConsole();</script>

    <script type="module" src="js/app.js?v=test293"></script> 

</body>
</html>
