<!DOCTYPE html>
<html lang="id">
<head>  
    <meta charset="UTF-8">  
    <title>My Strava Pro</title>   
    <meta name="viewport" content="width=device-width, initial-scale=1">   
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css' rel='stylesheet' />
    <link rel="stylesheet" href="css/main.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <style id="export-styles">
  /* 1. Kunci Container Utama */
  .is-exporting.activity-detail-wrapper {
    width: 600px !important;
    background-color: #F1F5F9 !important;
    padding: 30px !important;
    display: flex !important;
    flex-direction: column !important;
    gap: 20px !important; /* Kunci gap antar section */
  }

  /* 2. Kunci Teks Statistik (Hitam & Tengah) */
  .is-exporting .stat-value {
    color: #0F172A !important;
    font-size: 32px !important;
    font-weight: 800 !important;
    letter-spacing: 0 !important;
    line-height: 1.2 !important;
  }

  .is-exporting .label-muted {
    color: #475569 !important;
    font-size: 13px !important;
    font-weight: 700 !important;
    margin-bottom: 4px !important;
  }

  /* 3. PERBAIKAN KARTU GELAP (Time Analysis) */
  .is-exporting .time-analysis-card,
  .is-exporting [class*="bg-slate-900"] {
    background-color: #0F172A !important;
    border-radius: 20px !important;
    padding: 24px !important;
    color: #FFFFFF !important;
  }

  /* Paksa semua teks di dalam kartu gelap tetap putih */
  .is-exporting .time-analysis-card *,
  .is-exporting [class*="bg-slate-900"] * {
    color: #FFFFFF !important;
    opacity: 1 !important;
  }

  /* 4. Perbaikan Map (Kunci Posisi) */
  .is-exporting .mapboxgl-map {
    border-radius: 20px !important;
    margin-bottom: 10px !important;
  }

  /* 5. Sembunyikan UI */
  .is-exporting .no-export, 
  .is-exporting button, 
  .is-exporting .nav-menu,
  .is-exporting #__vconsole {
    display: none !important;
  }
    </style>
</head>

<body>

    <div id="app"></div> 

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>var vConsole = new window.VConsole();</script>

    <script type="module" src="js/app.js?v=test293"></script> 

</body>
</html>
